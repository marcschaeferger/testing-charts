# Source: newt/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: newt-matrix-scheduling-newt-scheduling
  labels:
    app.kubernetes.io/name: newt
    app.kubernetes.io/instance: newt-matrix-scheduling
    app.kubernetes.io/version: "1.10.1"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: newt-1.3.0
    app.kubernetes.io/component: newt
    newt.instance: scheduling
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: newt-matrix-scheduling
      newt.instance: scheduling
  template:
    metadata:
      labels:
        app.kubernetes.io/component: newt
        app.kubernetes.io/instance: newt-matrix-scheduling
        newt.instance: scheduling
    spec:
      serviceAccountName: newt-matrix-scheduling-newt-sa
      automountServiceAccountToken: false
      containers:
        - name: newt
          image: docker.io/fosrl/newt:1.10.1
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 65534
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: PANGOLIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: newt-auth
                  key: PANGOLIN_ENDPOINT
            - name: NEWT_ID
              valueFrom:
                secretKeyRef:
                  name: newt-auth
                  key: NEWT_ID
            - name: NEWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: newt-auth
                  key: NEWT_SECRET
            - name: LOG_LEVEL
              value: "INFO"
          ports:
            - name: wg
              containerPort: 51820
              protocol: UDP
            - name: tester
              containerPort: 51821
              protocol: UDP
          resources:
            limits:
              cpu: 200m
              ephemeral-storage: 256Mi
              memory: 256Mi
            requests:
              cpu: 100m
              ephemeral-storage: 128Mi
              memory: 128Mi
      nodeSelector:
        disktype: ssd
        workload: newt
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/e2e-az-name
                operator: In
                values:
                - e2e-az1
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - newt
              topologyKey: kubernetes.io/hostname
            weight: 100
      tolerations:
        - effect: NoSchedule
          key: dedicated
          operator: Equal
          value: newt
        - effect: NoExecute
          key: critical
          operator: Exists
          tolerationSeconds: 300
