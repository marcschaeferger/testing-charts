# Source: newt/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: newt-full-newt-main-tunnel
  labels:
    app.kubernetes.io/name: newt
    app.kubernetes.io/instance: newt-full
    app.kubernetes.io/version: "1.10.1"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: newt-1.3.0
    app.kubernetes.io/component: newt
    newt.instance: main-tunnel
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: newt-full
      newt.instance: main-tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/component: newt
        app.kubernetes.io/instance: newt-full
        newt.instance: main-tunnel
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9090"
        prometheus.io/scrape: "true"
    spec:
      serviceAccountName: newt-full-newt-sa
      automountServiceAccountToken: false
      containers:
        - name: newt
          image: docker.io/fosrl/newt:latest
          # WARNING: Do not use 'latest' tag for production deployments!
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 65534
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: PANGOLIN_ENDPOINT
              value: "https://pangolin.example.com"
            - name: NEWT_ID
              value: "my-id"
            - name: NEWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: newt-full-newt-main-tunnel
                  key: NEWT_SECRET
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: MTU
              value: "1400"
            - name: DNS
              value: "1.1.1.1"
            - name: PING_INTERVAL
              value: "3s"
            - name: PING_TIMEOUT
              value: "5s"
            - name: ACCEPT_CLIENTS
              value: "true"
            - name: INTERFACE
              value: "newt0"
            - name: EXAMPLE_MODE
              value: "true"
          ports:
            - name: wg
              containerPort: 51820
              protocol: UDP
            - name: tester
              containerPort: 51821
              protocol: UDP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              ephemeral-storage: 256Mi
              memory: 256Mi
            requests:
              cpu: 100m
              ephemeral-storage: 128Mi
              memory: 128Mi
