{{- $root := $ -}}
{{- range $index, $inst := $root.Values.newtInstances }}
{{- if $inst.enabled }}
{{- /* Validate blueprintFile has corresponding blueprintData */ -}}
{{- if and $inst.blueprintFile (not $inst.blueprintData) }}
{{- fail (printf "newtInstances[%d].blueprintFile is set but blueprintData is empty. Provide blueprintData or reference an existing ConfigMap." $index) }}
{{- end }}
{{- /* Warn about inline secrets - show warning but don't fail */ -}}
{{- if and $inst.secret (not (get (default dict $inst.auth) "existingSecretName")) }}
{{- $root := $ -}}
{{- $warning := printf "WARNING: newtInstances[%d].secret contains inline secret. Use auth.existingSecretName for production to avoid secrets in values." $index }}
{{- $_ := printf "%s\n" $warning }}
{{- end }}
{{- /* Warn about Docker socket mount - security sensitive */ -}}
{{- if and (kindIs "map" $inst.dockerSocket) $inst.dockerSocket.enabled }}
{{- $root := $ -}}
{{- $warning := printf "WARNING: newtInstances[%d].dockerSocket.enabled is set. Mounting the host Docker socket grants container escape potential. Use only in development/trusted environments." $index }}
{{- $_ := printf "%s\n" $warning }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}
  labels:
  {{- include "newt.labels" $root | nindent 4 }}
  {{- $md := dict "newt.instance" $inst.name "app.kubernetes.io/component" "newt" }}
  {{- toYaml $md | nindent 4 }}
  {{- range $k, $v := $root.Values.global.deploymentLabels }}
    {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- /* Merge top-level annotations from global */}}
  {{- $topAnns := dict }}
  {{- range $k, $v := $root.Values.global.additionalAnnotations }}
  {{- $_ := set $topAnns $k (printf "%v" $v) }}
  {{- end }}
  {{- range $k, $v := $root.Values.global.deploymentAnnotations }}
  {{- $_ := set $topAnns $k (printf "%v" $v) }}
  {{- end }}
  {{- if gt (len $topAnns) 0 }}
  annotations:
    {{- toYaml $topAnns | nindent 4 }}
  {{- end }}
spec:
  revisionHistoryLimit: {{ $root.Values.global.revisionHistoryLimit | default 3 }}
  replicas: {{ $inst.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      newt.instance: {{ $inst.name }}
  template:
    metadata:
      labels:
  {{- $pl := dict "app.kubernetes.io/instance" $root.Release.Name "newt.instance" $inst.name "app.kubernetes.io/component" "newt" }}
  {{- toYaml $pl | nindent 8 }}
  {{- /* Metrics: use effectiveMetrics helper to respect allowGlobalOverride */ -}}
  {{- $gm := (default (dict) $root.Values.global.metrics) -}}
  {{- $m := (include "newt.effectiveMetrics" (list $inst $gm)) | fromJson -}}
  {{- range $k, $v := $root.Values.global.additionalLabels }}
        {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- range $k, $v := $root.Values.global.podLabels }}
        {{ $k }}: {{ $v | quote }}
  {{- end }}
      {{- /* Build annotations in a temp dict, then emit only if non-empty */}}
      {{- $anns := dict }}
      {{- range $k, $v := $root.Values.global.podAnnotations }}
      {{- $_ := set $anns $k (printf "%v" $v) }}
      {{- end }}
      {{- /* Default Prometheus annotations if enabled and none provided */}}
      {{- if and $m.enabled (not $m.annotations) }}
      {{- $_ := set $anns "prometheus.io/scrape" "true" }}
      {{- $_ := set $anns "prometheus.io/port" (printf "%v" ($m.port | default 9090)) }}
      {{- $_ := set $anns "prometheus.io/path" (printf "%v" ($m.path | default "/metrics")) }}
      {{- end }}
      {{- $instAnns := $m.annotations | default dict }}
      {{- range $k, $v := $instAnns }}
      {{- $_ := set $anns $k (printf "%v" $v) }}
      {{- end }}
      {{- if gt (len $anns) 0 }}
      annotations:
        {{- toYaml $anns | nindent 8 }}
      {{- end }}
    spec:
      {{- $ips := include "newt.imagePullSecrets" $root -}}
      {{- if $ips }}
{{ $ips | nindent 6 }}
      {{- end }}
      {{- if or $root.Values.serviceAccount.create $root.Values.serviceAccount.name }}
      serviceAccountName: {{ include "newt.serviceAccountName" $root }}
      {{- end }}
      {{- with $root.Values.global.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      automountServiceAccountToken: {{ default false $root.Values.serviceAccount.automountServiceAccountToken }}
      {{- /* 
        Security Context Logic:
        
        PRIORITY ORDER:
        1. Native mode (useNativeInterface OR global.nativeMode.enabled): privileged + root
        2. Instance override (if allowGlobalOverride): user-defined securityContext
        3. Global override: user-defined securityContext  
        4. Default secure mode: non-root with restricted capabilities
        
        VALIDATION:
        - If user sets runAsUser: 0 but also sets capabilities.drop, fail rendering
        - This prevents invalid security combinations
      */ -}}
      {{- $nativeEnabled := or $inst.useNativeInterface $root.Values.global.nativeMode.enabled }}
      {{- $canOverride := (default false $inst.allowGlobalOverride) }}
      
      {{- /* Validate: user override cannot combine root with capabilities.drop */ -}}
      {{- if and $canOverride (kindIs "map" $inst.securityContext) (hasKey $inst.securityContext "capabilities") }}
        {{- $overrideSecCtx := $inst.securityContext }}
        {{- $overrideRunAsUser := (hasKey $overrideSecCtx "runAsUser") | ternary (index $overrideSecCtx "runAsUser") 0 }}
        {{- $overrideCaps := (hasKey $overrideSecCtx "capabilities") | ternary (index $overrideSecCtx "capabilities") (dict "drop" (list)) }}
        {{- $overrideCapsDrop := (hasKey $overrideCaps "drop") | ternary (index $overrideCaps "drop") (list) }}
        {{- if and (eq ($overrideRunAsUser | int) 0) (gt (len $overrideCapsDrop) 0) }}
          {{- fail "newtInstances[].securityContext: Dropping capabilities is not supported when running as root. Either remove runAsUser: 0 or capabilities.drop from your securityContext override." }}
        {{- end }}
      {{- end }}
      
      {{- /* Pod-level securityContext */ -}}
      {{- if and $canOverride $inst.podSecurityContext }}
      securityContext:
        {{- toYaml $inst.podSecurityContext | nindent 8 }}
      {{- else if $root.Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml $root.Values.global.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if $nativeEnabled }}
      {{- if $inst.hostNetwork }}
      hostNetwork: true
      {{- end }}
      {{- if $inst.hostPID }}
      hostPID: true
      {{- end }}
      {{- end }}
      {{- with $inst.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: newt
          image: {{ include "newt.image" $root }}
          {{- $g := $root.Values.global.image -}}
          {{- $l := $root.Values.image -}}
          {{- $digest := default (default "" $l.digest) $g.digest -}}
          {{- $tag := default (default $root.Chart.AppVersion $l.tag) $g.tag -}}
          {{- if and (eq (trim $tag) "latest") (not $digest) }}
          {{- printf "# WARNING: Do not use 'latest' tag for production deployments!" | nindent 10 }}
          {{- end }}
          imagePullPolicy: {{ include "newt.imagePullPolicy" $root }}
          {{- if $nativeEnabled }}
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          {{- else if and $canOverride $inst.securityContext }}
          securityContext:
            {{- toYaml $inst.securityContext | nindent 12 }}
          {{- else if $root.Values.global.securityContext }}
          securityContext:
            {{- toYaml $root.Values.global.securityContext | nindent 12 }}
          {{- else }}
          securityContext:
            runAsUser: 65534
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- end }}
          {{- if not $inst.useCommandArgs }}
          env:
            {{- include "newt.instance.env" (dict "root" $root "inst" $inst) | trim | nindent 12 }}
          {{- else }}
          {{- include "newt.instance.commandArgs" (dict "root" $root "inst" $inst) | nindent 10 }}
          env:
            {{- $auth := default (dict) $inst.auth }}
            {{- $existing := get $auth "existingSecretName" }}
            {{- if $existing }}
            {{- $keys := (default dict (get $auth "keys")) -}}
            {{- $endpointKey := (default "PANGOLIN_ENDPOINT" $keys.endpointKey) -}}
            {{- $idKey := (default "NEWT_ID" $keys.idKey) -}}
            {{- $secretKey := (default "NEWT_SECRET" $keys.secretKey) -}}
            - name: PANGOLIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ $existing }}
                  key: {{ $endpointKey }}
            - name: NEWT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $existing }}
                  key: {{ $idKey }}
            - name: NEWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $existing }}
                  key: {{ $secretKey }}
            {{- else if $inst.secret }}
            - name: NEWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}
                  key: NEWT_SECRET
            {{- end }}
            {{- include "newt.instance.extraEnv" (dict "root" $root "inst" $inst) | nindent 12 }}
          {{- end }}
          ports:
            - name: wg
              containerPort: 51820
              protocol: UDP
            - name: tester
              containerPort: 51821
              protocol: UDP
            {{- if $m.enabled }}
            - name: {{ $m.portName | default "metrics" }}
              containerPort: {{ $m.port | default 9090 }}
              protocol: TCP
            {{- end }}
          {{- /* Emit volumeMounts only if we have any */}}
          {{- $hasDockerMount := and (kindIs "map" $inst.dockerSocket) $inst.dockerSocket.enabled }}
          {{- $mtls := (default (dict) $inst.mtls) }}
          {{- $hasMtlsMount := and $mtls.enabled (or (not $mtls.secretName) $mtls.secretName) }}
          {{- $hasPemMount := and $mtls.enabled (eq (default "pkcs12" $mtls.mode) "pem") }}
          {{- $hasUpdownMount := and (kindIs "map" $inst.updown) $inst.updown.enabled }}
          {{- $hasBlueprintMount := $inst.blueprintFile }}
          {{- $hasExtraMounts := gt (len (default (list) $inst.extraVolumeMounts)) 0 }}
          {{- if or $hasDockerMount $hasMtlsMount $hasPemMount $hasUpdownMount $hasBlueprintMount $hasExtraMounts }}
          volumeMounts:
            {{- if and (kindIs "map" $inst.dockerSocket) $inst.dockerSocket.enabled (not $inst.useNativeInterface) }}
            - name: docker-socket
              mountPath: {{ $inst.dockerSocket.path }}
              readOnly: true
            {{- else if and (kindIs "map" $inst.dockerSocket) $inst.dockerSocket.enabled }}
            - name: docker-socket
              mountPath: {{ $inst.dockerSocket.path }}
            {{- end }}
            {{- /* PKCS12 mode */ -}}
            {{- if and $mtls.enabled (eq (default "pkcs12" $mtls.mode) "pkcs12") $mtls.secretName }}
            {{- $cp := ternary $mtls.certPath "/certs/client.p12" (and (kindIs "map" $mtls) (kindIs "string" $mtls.certPath) (ne $mtls.certPath "")) -}}
            - name: mtls-cert
              mountPath: {{ dir $cp | quote }}
              readOnly: true
            {{- end }}
            {{- /* PEM mode */ -}}
            {{- if and $mtls.enabled (eq (default "pkcs12" $mtls.mode) "pem") }}
            {{- $pem := (default (dict) $mtls.pem) }}
            {{- if $pem.clientCertPath }}
            - name: mtls-client-cert
              mountPath: {{ dir $pem.clientCertPath | quote }}
              readOnly: true
            {{- end }}
            {{- if $pem.clientKeyPath }}
            - name: mtls-client-key
              mountPath: {{ dir $pem.clientKeyPath | quote }}
              readOnly: true
            {{- end }}
            {{- if $pem.caPath }}
            - name: mtls-ca-cert
              mountPath: {{ dir $pem.caPath | quote }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- /* Blueprint file mount */ -}}
            {{- if $inst.blueprintFile }}
            - name: blueprint-file
              mountPath: {{ dir $inst.blueprintFile | quote }}
              readOnly: true
            {{- end }}
            {{- if and (kindIs "map" $inst.updown) $inst.updown.enabled }}
            - name: updown-script
              mountPath: {{ default "/opt/newt/updown" $inst.updown.mountPath }}
            {{- end }}
            {{- range $inst.extraVolumeMounts }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- if $root.Values.global.health.enabled }}
          livenessProbe:
            exec:
              command:
                - test
                - "-f"
                - {{ default $root.Values.global.health.path $inst.healthFile | quote }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - test
                - "-f"
                - {{ default $root.Values.global.health.path $inst.healthFile | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: {{ $root.Values.global.health.readinessFailureThreshold | default 3 }}
          {{- end }}
          {{- /* Lifecycle hooks for graceful WireGuard shutdown */}}
          {{- if and $inst.lifecycle (kindIs "map" $inst.lifecycle) }}
          lifecycle:
            {{- toYaml $inst.lifecycle | nindent 12 }}
          {{- end }}
          resources:
            {{- if and $canOverride $inst.resources }}
            {{- toYaml $inst.resources | nindent 12 }}
            {{- else if $root.Values.global.resources }}
            {{- toYaml $root.Values.global.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
              ephemeral-storage: 256Mi
          {{- end }}
      {{- with $inst.extraContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* Emit volumes only if we have any */}}
  {{- $hasDockerVol := and (kindIs "map" $inst.dockerSocket) $inst.dockerSocket.enabled }}
  {{- $mtls := (default (dict) $inst.mtls) }}
  {{- $hasMtlsVol := and $mtls.enabled }}
  {{- $hasPemVol := and $mtls.enabled (eq (default "pkcs12" $mtls.mode) "pem") }}
  {{- $hasUpdownVol := and (kindIs "map" $inst.updown) $inst.updown.enabled }}
  {{- $hasBlueprintVol := $inst.blueprintFile }}
  {{- $hasExtraVols := gt (len (default (list) $inst.extraVolumes)) 0 }}
      {{- if or $hasDockerVol $hasMtlsVol $hasPemVol $hasUpdownVol $hasBlueprintVol $hasExtraVols }}
      volumes:
        {{- if and (kindIs "map" $inst.dockerSocket) $inst.dockerSocket.enabled }}
        - name: docker-socket
          hostPath:
            path: {{ $inst.dockerSocket.path }}
            type: Socket
        {{- end }}
        {{- /* PKCS12 mode */ -}}
        {{- if and $mtls.enabled (eq (default "pkcs12" $mtls.mode) "pkcs12") }}
        - name: mtls-cert
          {{- if $mtls.secretName }}
          secret:
            secretName: {{ $mtls.secretName }}
          {{- else }}
          secret:
            secretName: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}
          {{- end }}
        {{- end }}
        {{- /* PEM mode */ -}}
        {{- if and $mtls.enabled (eq (default "pkcs12" $mtls.mode) "pem") }}
        {{- $pem := (default (dict) $mtls.pem) }}
        {{- if $pem.secretName }}
        - name: mtls-client-cert
          secret:
            secretName: {{ $pem.secretName }}
            items:
              - key: client.crt
                path: {{ $pem.clientCertPath | base }}
        {{- if $pem.clientKeyPath }}
        - name: mtls-client-key
          secret:
            secretName: {{ $pem.secretName }}
            items:
              - key: client.key
                path: {{ $pem.clientKeyPath | base }}
        {{- end }}
        {{- if $pem.caPath }}
        - name: mtls-ca-cert
          secret:
            secretName: {{ $pem.secretName }}
            items:
              - key: ca.crt
                path: {{ $pem.caPath | base }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- /* Blueprint file */ -}}
        {{- if $inst.blueprintFile }}
        - name: blueprint-file
          configMap:
            name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}-blueprint
        {{- end }}
        {{- if and (kindIs "map" $inst.updown) $inst.updown.enabled }}
        - name: updown-script
          configMap:
            name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}-updown
            defaultMode: 0755
        {{- end }}
        {{- range $inst.extraVolumes }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- /* Merge global and instance scheduling: instance wins for map keys; tolerations concatenate */}}
      {{- $gNode := (default (dict) $root.Values.global.nodeSelector) -}}
      {{- $iNode := (default (dict) $inst.nodeSelector) -}}
      {{- $node := mergeOverwrite (deepCopy $gNode) $iNode -}}
      {{- if $node }}
      nodeSelector:
        {{- toYaml $node | nindent 8 }}
      {{- end }}
      {{- $gAff := (default (dict) $root.Values.global.affinity) -}}
      {{- $iAff := (default (dict) $inst.affinity) -}}
      {{- $aff := mergeOverwrite (deepCopy $gAff) $iAff -}}
      {{- if or $aff.nodeAffinity $aff.podAffinity $aff.podAntiAffinity }}
      affinity:
        {{- toYaml $aff | nindent 8 }}
      {{- end }}
      {{- $gTol := (default (list) $root.Values.global.tolerations) -}}
      {{- $iTol := (default (list) $inst.tolerations) -}}
      {{- $tols := concat $gTol $iTol -}}
      {{- if gt (len $tols) 0 }}
      tolerations:
        {{- toYaml $tols | nindent 8 }}
      {{- end }}
      {{- /* Topology spread constraints: instance overrides global */ -}}
      {{- $gTopo := (default (list) $root.Values.global.topologySpreadConstraints) -}}
      {{- $iTopo := (default (list) $inst.topologySpreadConstraints) -}}
      {{- $topo := concat $gTopo $iTopo -}}
      {{- if gt (len $topo) 0 }}
      topologySpreadConstraints:
        {{- toYaml $topo | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
