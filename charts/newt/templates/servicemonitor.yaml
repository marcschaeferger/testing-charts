{{- $root := $ -}}
{{- $vals := $root.Values | default dict -}}
{{- $gm := (default (dict) (get $vals "global") .metrics | default (dict) ) -}}
{{- $tm := (default (dict) (get $vals "metrics")) -}}
{{- $m := mergeOverwrite (deepCopy $gm) $tm -}}

{{- /* Check global enabled and whether any instance enables serviceMonitor (respecting allowGlobalOverride) */ -}}
{{- $root := $ -}}
{{- $vals := $root.Values | default dict -}}
{{- $global := (default (dict) (get $vals "global")) -}}
{{- $gm := (default (dict) (get $global "metrics")) -}}
{{- $tm := (default (dict) (get $vals "metrics")) -}}
{{- $m := mergeOverwrite (deepCopy $gm) $tm -}}

{{- /* prepare serviceMonitor sub-object */ -}}
{{- $mSM := (default (dict) (get $m "serviceMonitor")) -}}

{{- /* Check global metrics enabled and whether any instance enables serviceMonitor (respecting allowGlobalOverride) */ -}}
{{- $shouldRender := false -}}
{{- if $m.enabled -}}
  {{- if $mSM.enabled -}}
    {{- $shouldRender = true -}}
  {{- else -}}
    {{- range $i, $inst := (get $vals "newtInstances") -}}
      {{- if $inst.enabled -}}
        {{- $eff := (include "newt.effectiveMetrics" (list $inst $gm)) | fromJson -}}
        {{- $effSM := (default (dict) (get $eff "serviceMonitor")) -}}
        {{- if $effSM.enabled -}}
          {{- $shouldRender = true -}}
          {{- break -}}
        {{- end -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if $shouldRender -}}
  {{- if and $m.podMonitor.enabled $mSM.enabled -}}
  {{- fail "Either metrics.podMonitor.enabled or metrics.serviceMonitor.enabled can be enabled at a time, but not both." -}}
  {{- end -}}
  {{- if and $mSM.enabled (not $m.service.enabled) -}}
  {{- fail "metrics.service.enabled must be true when metrics.serviceMonitor.enabled is true, because ServiceMonitor targets a Service port." -}}
  {{- end -}}
apiVersion: {{ $mSM.apiVersion | default "monitoring.coreos.com/v1" }}
kind: ServiceMonitor
metadata:
  name: {{ include "newt.fullname" . }}
  {{- with $mSM.namespace }}
  {{- if . }}
  namespace: {{ . }}
  {{- end }}
  {{- end }}
  labels:
    {{- include "newt.labels" . | nindent 4 }}
    {{- with $mSM.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
    - interval: {{ $mSM.interval | default "30s" }}
      {{- with $mSM.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      honorLabels: true
      port: {{ default (default "metrics" $m.portName) $m.service.portName }}
      scheme: {{ $mSM.scheme | default "http" }}
      {{- with $mSM.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $mSM.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  jobLabel: {{ default "app.kubernetes.io/name" $mSM.jobLabel | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "newt.name" . }}
      app.kubernetes.io/component: metrics
  namespaceSelector:
    matchNames:
      - {{ include "newt.namespace" . }}
  {{- with $mSM.targetLabels }}
  targetLabels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  sampleLimit: {{ $mSM.sampleLimit | default 0 }}
{{- end }}
