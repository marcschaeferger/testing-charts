{{- $root := . -}}
{{- $gPdb := $root.Values.global.podDisruptionBudget }}
{{- if $gPdb.enabled }}
{{- range $i, $inst := $root.Values.newtInstances }}
{{- if $inst.enabled }}
{{- $instPdb := (default (dict) $inst.podDisruptionBudget) -}}
{{- $pdbEnabled := (get $instPdb "enabled") -}}
{{- if or (eq $pdbEnabled nil) $pdbEnabled }}
{{- $minAvail := coalesce (get $instPdb "minAvailable") $gPdb.minAvailable -}}
{{- $maxAvail := coalesce (get $instPdb "maxUnavailable") $gPdb.maxUnavailable -}}
{{- if and $minAvail $maxAvail }}
{{- fail "Cannot specify both minAvailable and maxUnavailable in PodDisruptionBudget. Choose one." }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}-pdb
  labels:
    {{- include "newt.labels" $root | nindent 4 }}
    newt.instance: {{ $inst.name }}
  {{- $mergedAnns := mergeOverwrite (deepCopy (default dict $gPdb.annotations)) (default dict (get $instPdb "annotations")) -}}
  {{- if gt (len $mergedAnns) 0 }}
  annotations:
    {{- toYaml $mergedAnns | nindent 4 }}
  {{- end }}
spec:
  {{- with $minAvail }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with $maxAvail }}
  maxUnavailable: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      newt.instance: {{ $inst.name }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
