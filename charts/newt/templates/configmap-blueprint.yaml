{{- $root := . -}}
{{- range $idx, $inst := .Values.newtInstances }}
{{- $inst := $inst | default dict -}}
{{- if and $inst.enabled $inst.blueprintFile }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}-blueprint
  labels:
    {{- include "newt.labels" $root | nindent 4 }}
    newt.instance: {{ $inst.name }}
  {{- with $root.Values.global.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- /* Extract filename from path */ -}}
  {{- $filename := $inst.blueprintFile | base -}}
  {{- $data := $inst.blueprintData -}}
  {{- if $data }}
  {{ $filename }}: |
    {{- $data | nindent 4 }}
  {{- else }}
  {{ $filename }}: |
    # Blueprint configuration not provided inline.
    # Mount your own ConfigMap or provide blueprintData.
  {{- end }}
{{- end }}
{{- end }}
