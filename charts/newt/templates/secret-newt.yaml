{{- $root := . -}}
{{- range $idx, $inst := .Values.newtInstances }}
{{- $inst := $inst | default dict -}}
{{- $instMtls := (default (dict) $inst.mtls) -}}
{{- $auth := (default (dict) $inst.auth) -}}
{{- $existingSecretName := get $auth "existingSecretName" -}}
{{- $hasInlineSecret := $inst.secret }}
{{- $hasExternalAuth := $existingSecretName }}
{{- $hasMtlsInline := and $instMtls.enabled (or (not $instMtls.secretName) $instMtls.p12Base64) }}
{{- $hasMtlsExternal := and $instMtls.enabled $instMtls.secretName }}
{{- if and $hasInlineSecret $hasExternalAuth }}
{{- fail "newtInstances: Cannot specify both inline secret (newtInstances[].secret) and external auth (newtInstances[].auth.existingSecretName). Choose one authentication method." }}
{{- end }}
{{- if and $inst.enabled (not $hasInlineSecret) (not $hasExternalAuth) (not $hasMtlsInline) (not $hasMtlsExternal) }}
{{- fail "newtInstances: Credentials required. Either set newtInstances[].secret or newtInstances[].auth.existingSecretName or provide mtls.secretName/mtls.p12Base64" }}
{{- end }}
{{- if $inst.enabled }}
{{- if or $hasInlineSecret $hasMtlsInline }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}
  labels:
    {{- include "newt.labels" $root | nindent 4 }}
    newt.instance: {{ $inst.name }}
  {{- /* Build annotations: merge global with warning for inline secrets */ -}}
  {{- $annots := dict -}}
  {{- /* First add global annotations if present */ -}}
  {{- range $k, $v := (default dict $root.Values.global.additionalAnnotations) }}
  {{- $_ := set $annots $k $v }}
  {{- end }}
  {{- /* Add warning for inline secrets */ -}}
  {{- if $hasInlineSecret }}
  {{- $_ := set $annots "newt.helm.warning" "Inline secrets detected. Use auth.existingSecretName for production deployments to avoid secrets in values." }}
  {{- end }}
  {{- if gt (len $annots) 0 }}
  annotations:
    {{- toYaml $annots | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if $hasInlineSecret }}
  NEWT_SECRET: {{ $inst.secret | b64enc | quote }}
  {{- end }}
  {{- if $hasMtlsInline }}
  client.p12: {{ $instMtls.p12Base64 | default "" | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
