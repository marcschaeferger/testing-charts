# All-options-like example adapted for charts/newt (reference only)
global:
  image:
    registry: docker.io
    repository: fosrl/newt
    tag: latest
  logLevel: INFO
  metrics:
    enabled: true
    service:
      enabled: true
      type: ClusterIP
      port: 9090
newtInstances:
  - name: main-tunnel
    enabled: true
    pangolinEndpoint: "https://pangolin.example.com"
    id: example-id
    secret: example-secret
    mtu: 1380
    dns: 8.8.8.8
    acceptClients: false
    useNativeInterface: false
    service:
      enabled: true
      type: LoadBalancer
      port: 51820
      testerPort: 51821
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    extraEnv:
      EXAMPLE_FLAG: "true"
