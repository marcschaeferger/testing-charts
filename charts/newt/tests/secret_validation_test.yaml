suite: Secret validation
templates:
  - templates/secret-newt.yaml
tests:
  - it: renders secret when secret is provided inline
    set:
      newtInstances:
        - name: inline-secret
          enabled: true
          secret: my-secret-value
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.NEWT_SECRET
          value: "bXktc2VjcmV0LXZhbHVl"

  - it: does NOT render secret when existingSecretName is provided (external secret)
    set:
      newtInstances:
        - name: existing-secret
          enabled: true
          auth:
            existingSecretName: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: renders secret when mtls enabled with inline p12
    set:
      newtInstances:
        - name: mtls-secret
          enabled: true
          mtls:
            enabled: true
            p12Base64: cGtlMTIz
    asserts:
      - isKind:
          of: Secret

  - it: renders secret when mtls enabled with inline p12
    set:
      newtInstances:
        - name: mtls-secret
          enabled: true
          mtls:
            enabled: true
    asserts:
      - isKind:
          of: Secret

  - it: fails when both inline secret and external auth are provided
    set:
      newtInstances:
        - name: dual-auth
          enabled: true
          secret: my-inline-secret
          auth:
            existingSecretName: my-existing-secret
    asserts:
      - failedTemplate: {}

  - it: fails when no credentials are provided
    set:
      newtInstances:
        - name: no-credentials
          enabled: true
    asserts:
      - failedTemplate: {}

  - it: adds warning annotation when inline secret is used
    set:
      newtInstances:
        - name: warn-inline-secret
          enabled: true
          secret: my-secret-value
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.annotations["newt.helm.warning"]
          value: "Inline secrets detected. Use auth.existingSecretName for production deployments to avoid secrets in values."
